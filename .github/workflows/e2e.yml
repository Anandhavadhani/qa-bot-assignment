name: E2E Tests (Docker Compose)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      COMPOSE_DOCKER_CLI_BUILD: 1
      DOCKER_BUILDKIT: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Build and start services with Docker Compose
        run: |
          docker compose up -d --build

      - name: Wait for Postgres to be ready
        run: |
          for i in $(seq 1 30); do
            docker exec qabot-postgres pg_isready -U postgres && break || sleep 2
          done

      - name: Wait for Redis to be ready
        run: |
          for i in $(seq 1 30); do
            docker exec qabot-redis redis-cli ping | grep PONG && break || sleep 2
          done

      - name: Run backend E2E tests
        run: |
          cd backend
          npm ci
          # Run E2E tests only (RUN_E2E=true)
          RUN_E2E=true API_URL=http://localhost:3000 npm test -- --testPathPattern=tests/e2e --runInBand
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Tear down
        if: always()
        run: |
          docker compose down --volumes

  pr-tests:
    # Run on PRs with a Node matrix for faster feedback
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies (backend)
        run: |
          cd backend
          npm ci

      - name: Run unit & integration tests (fast)
        run: |
          cd backend
          npm test -- --runInBand --silent

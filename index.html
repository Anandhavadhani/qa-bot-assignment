<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI QA Bot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .content {
      padding: 30px 20px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }

    .upload-area {
      border: 2px dashed #667eea;
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: background-color 0.3s, border-color 0.3s;
      background: #f8f9ff;
    }

    .upload-area:hover {
      background: #f0f2ff;
      border-color: #764ba2;
    }

    .upload-area.dragover {
      background: #e8ebff;
      border-color: #764ba2;
    }

    .upload-area input[type='file'] {
      display: none;
    }

    .upload-area-text {
      color: #667eea;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .upload-area-hint {
      color: #999;
      font-size: 12px;
    }

    .file-list {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-item {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }

    .file-item-name {
      color: #333;
      word-break: break-word;
      flex: 1;
    }

    .file-item-size {
      color: #999;
      font-size: 12px;
      margin-left: 8px;
      white-space: nowrap;
    }

    .file-remove-btn {
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 12px;
      margin-left: 12px;
      transition: background-color 0.3s;
    }

    .file-remove-btn:hover {
      background: #ff5252;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
      transition: border-color 0.3s;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      background: white;
      transition: border-color 0.3s;
    }

    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .button-group {
      display: flex;
      gap: 12px;
    }

    .submit-btn {
      flex: 1;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: opacity 0.3s, transform 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .spinner.show {
      display: inline-block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .results {
      display: none;
      margin-top: 24px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }

    .results.show {
      display: block;
    }

    .results-title {
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .results-answer {
      color: #555;
      line-height: 1.6;
      margin-bottom: 16px;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .results-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #999;
      flex-wrap: wrap;
      gap: 12px;
    }

    .results-meta-item {
      display: flex;
      gap: 4px;
    }

    .copy-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: background-color 0.3s;
      flex-shrink: 0;
    }

    .copy-btn:hover {
      background: #764ba2;
    }

    .copy-btn.copied {
      background: #51cf66;
    }

    .error-banner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #ff6b6b;
      color: white;
      padding: 16px 20px;
      text-align: center;
      font-size: 14px;
      z-index: 1000;
      animation: slideDown 0.3s ease-out;
    }

    .error-banner.show {
      display: block;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-100%);
      }
      to {
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .header {
        padding: 24px 16px;
      }

      .header h1 {
        font-size: 24px;
      }

      .content {
        padding: 20px 16px;
      }

      .results-meta {
        flex-direction: column;
        align-items: flex-start;
      }

      .copy-btn {
        align-self: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="error-banner" id="errorBanner" role="alert" aria-live="polite" aria-hidden="true"></div>

  <div class="container">
    <div class="header">
      <h1>AI QA Bot</h1>
      <p>Upload documents and ask questions using AI</p>
    </div>

    <div class="content">
      <form id="qaForm">
        <div class="form-group">
          <label class="form-label" for="fileUpload">Upload Documents</label>
          <div class="upload-area" id="uploadArea" role="button" tabindex="0" aria-label="Click or drag files to upload">
            <div class="upload-area-text">Click to upload or drag and drop</div>
            <div class="upload-area-hint">PDF, DOCX, CSV, or TXT files up to 10MB each</div>
            <input type="file" id="fileUpload" multiple accept=".pdf,.docx,.doc,.csv,.txt" />
          </div>
          <div class="file-list" id="fileList"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="question">Your Question</label>
          <textarea id="question" placeholder="Ask a question about your documents..." aria-label="Question textarea" required></textarea>
        </div>

        <div class="form-group">
          <label class="form-label" for="promptType">Response Style</label>
          <select id="promptType" aria-label="Select response style">
            <option value="default">Default - Accurate and Cited</option>
            <option value="detailed">Detailed - Comprehensive Analysis</option>
            <option value="concise">Concise - Brief and Direct</option>
            <option value="technical">Technical - Depth and Terminology</option>
          </select>
        </div>

        <div class="button-group">
          <button type="submit" class="submit-btn" id="submitBtn" aria-label="Submit question">
            <span class="spinner" id="spinner"></span>
            <span id="submitText">Ask Question</span>
          </button>
        </div>
      </form>

      <div class="results" id="results" role="region" aria-live="polite" aria-label="Results">
        <div class="results-title">Answer</div>
        <div class="results-answer" id="resultsAnswer"></div>
        <div class="results-meta">
          <div class="results-meta-item">
            <strong>Model:</strong>
            <span id="resultsMeta"></span>
          </div>
          <div class="results-meta-item">
            <strong>Time:</strong>
            <span id="resultsTime"></span>
          </div>
          <button type="button" class="copy-btn" id="copyBtn" aria-label="Copy answer to clipboard">Copy</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const fileUpload = document.getElementById('fileUpload');
    const uploadArea = document.getElementById('uploadArea');
    const fileList = document.getElementById('fileList');
    const question = document.getElementById('question');
    const promptType = document.getElementById('promptType');
    const qaForm = document.getElementById('qaForm');
    const submitBtn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const submitText = document.getElementById('submitText');
    const results = document.getElementById('results');
    const resultsAnswer = document.getElementById('resultsAnswer');
    const resultsMeta = document.getElementById('resultsMeta');
    const resultsTime = document.getElementById('resultsTime');
    const copyBtn = document.getElementById('copyBtn');
    const errorBanner = document.getElementById('errorBanner');

    let selectedFiles = [];

    uploadArea.addEventListener('click', () => fileUpload.click());
    uploadArea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        fileUpload.click();
      }
    });

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const files = Array.from(e.dataTransfer.files);
      handleFiles(files);
    });

    fileUpload.addEventListener('change', (e) => {
      const files = Array.from(e.target.files || []);
      handleFiles(files);
    });

    function handleFiles(newFiles) {
      const validatedFiles = [];

      for (const file of newFiles) {
        const ext = file.name.split('.').pop().toLowerCase();
        if (!['pdf', 'docx', 'doc', 'csv', 'txt'].includes(ext)) {
          showError(`Invalid file type: ${file.name}. Supported: PDF, DOCX, CSV, TXT`);
          continue;
        }

        if (file.size > 10 * 1024 * 1024) {
          showError(`File too large: ${file.name}. Max 10MB.`);
          continue;
        }

        validatedFiles.push(file);
      }

      selectedFiles = validatedFiles;
      renderFileList();
      updateSubmitButton();
    }

    function renderFileList() {
      fileList.innerHTML = '';

      selectedFiles.forEach((file, index) => {
        const size = (file.size / 1024 / 1024).toFixed(2);
        const item = document.createElement('div');
        item.className = 'file-item';
        item.innerHTML = `
          <span class="file-item-name">${file.name}</span>
          <span class="file-item-size">${size}MB</span>
          <button type="button" class="file-remove-btn" aria-label="Remove ${file.name}">Remove</button>
        `;

        item.querySelector('.file-remove-btn').addEventListener('click', (e) => {
          e.preventDefault();
          selectedFiles.splice(index, 1);
          renderFileList();
          updateSubmitButton();
        });

        fileList.appendChild(item);
      });
    }

    function updateSubmitButton() {
      const hasFile = selectedFiles.length > 0;
      const hasQuestion = question.value.trim().length > 0;
      submitBtn.disabled = !hasFile || !hasQuestion;
    }

    question.addEventListener('input', updateSubmitButton);
    updateSubmitButton();

    qaForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (selectedFiles.length === 0) {
        showError('Please select at least one file');
        return;
      }

      if (!question.value.trim()) {
        showError('Please enter a question');
        return;
      }

      await submitQuestion();
    });

    async function submitQuestion() {
      submitBtn.disabled = true;
      spinner.classList.add('show');
      submitText.textContent = 'Processing...';
      results.classList.remove('show');
      errorBanner.classList.remove('show');

      try {
        const formData = new FormData();
        selectedFiles.forEach((file) => {
          formData.append('files', file);
        });
        formData.append('question', question.value);
        formData.append('promptType', promptType.value);

        const response = await fetch('/search/upload', {
          method: 'POST',
          body: formData,
        });

        const data = await response.json();

        if (!response.ok) {
          showError(data.error || 'An error occurred');
          return;
        }

        resultsAnswer.textContent = data.answer;
        resultsMeta.textContent = data.model;
        resultsTime.textContent = `${data.responseTime}ms`;
        results.classList.add('show');
      } catch (err) {
        showError(err.message || 'Failed to submit question');
      } finally {
        submitBtn.disabled = false;
        spinner.classList.remove('show');
        submitText.textContent = 'Ask Question';
        updateSubmitButton();
      }
    }

    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(resultsAnswer.textContent);
        const originalText = copyBtn.textContent;
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = originalText;
          copyBtn.classList.remove('copied');
        }, 2000);
      } catch (err) {
        showError('Failed to copy');
      }
    });

    function showError(message) {
      errorBanner.textContent = message;
      errorBanner.classList.add('show');
      errorBanner.setAttribute('aria-hidden', 'false');

      setTimeout(() => {
        errorBanner.classList.remove('show');
        errorBanner.setAttribute('aria-hidden', 'true');
      }, 8000);
    }
  </script>
</body>
</html>

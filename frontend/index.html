<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA Bot - Upload & Ask Questions</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div id="app">
    <div class="navbar">
      <div class="navbar-brand">QA Bot</div>
      <div class="navbar-menu">
        <a href="#" id="nav-dashboard" class="nav-link">Dashboard</a>
        <a href="#" id="nav-logout" class="nav-link">Logout</a>
      </div>
    </div>

    <main class="container">
      <div id="auth-page" class="page hidden">
        <div class="auth-container">
          <h1>Welcome to QA Bot</h1>
          <p>Upload documents and ask intelligent questions</p>
          
          <div class="auth-tabs">
            <button id="tab-login" class="tab-button active">Login</button>
            <button id="tab-signup" class="tab-button">Sign Up</button>
          </div>

          <!-- Login Form -->
          <form id="login-form" class="auth-form">
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn btn-primary">Login</button>
            <p class="error-message" id="login-error"></p>
          </form>

          <!-- Signup Form -->
          <form id="signup-form" class="auth-form hidden">
            <input type="text" placeholder="Username" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn btn-primary">Sign Up</button>
            <p class="error-message" id="signup-error"></p>
          </form>
        </div>
      </div>

      <div id="dashboard-page" class="page hidden">
        <h1>My Documents</h1>
        
        <div class="upload-section">
          <div class="upload-box" id="upload-drop-zone">
            <p>Drag & drop your document here</p>
            <p>or</p>
            <input type="file" id="file-input" accept=".pdf,.docx,.csv,.txt" hidden>
            <button type="button" class="btn btn-secondary" onclick="document.getElementById('file-input').click()">
              Choose File
            </button>
            <p class="upload-info">Supported: PDF, DOCX, CSV, TXT (Max 50MB)</p>
          </div>
          <div id="upload-progress" class="progress hidden">
            <div class="progress-bar" id="progress-bar"></div>
            <span id="progress-text">0%</span>
          </div>
        </div>

        <div class="documents-section">
          <h2>Documents</h2>
          <div id="documents-list" class="documents-list">
            <p class="empty-state">No documents uploaded yet</p>
          </div>
        </div>
      </div>

      <div id="chat-page" class="page hidden">
        <div class="chat-container">
          <div class="chat-header">
            <h2 id="chat-title">Chat</h2>
            <button id="close-chat" class="btn-close">×</button>
          </div>

          <div id="messages-container" class="messages-container">
            <p class="empty-state">Select a document to start asking questions</p>
          </div>

          <div class="chat-input-section">
            <textarea 
              id="question-input" 
              placeholder="Ask a question about the document..." 
              rows="3"
            ></textarea>
            <button id="send-button" class="btn btn-primary">Send</button>
          </div>

          <div id="loading-indicator" class="loading hidden">
            <div class="spinner"></div>
            <p>Processing...</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/document.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
